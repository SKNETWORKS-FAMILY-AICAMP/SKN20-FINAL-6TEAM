# RAG 서비스 제외 docker-compose (로컬 RAG 개발용)
#
# 용도: RAG를 로컬(MPS)에서 직접 실행하고 나머지 서비스만 Docker로 띄울 때
#
# 사용법:
#   1. Docker 스택 시작 (RAG 제외):
#      docker compose -f docker-compose.no-rag.yaml up --build
#
#   2. RAG를 로컬에서 실행 (MPS 활성화):
#      cd rag
#      PYTORCH_ENABLE_MPS_FALLBACK=1 EMBEDDING_PROVIDER=local \
#        CHROMA_HOST=localhost CHROMA_PORT=8200 \
#        ...(기타 .env 변수) \
#        ../.venv/bin/uvicorn main:app --host 0.0.0.0 --port 8001 --reload
#
# 참고:
#   - ChromaDB는 host.docker.internal:8200으로 접근 (docker-compose가 8200 포트 노출)
#   - Backend → RAG: http://host.docker.internal:8001 (로컬 RAG 접근)
#   - Redis가 필요한 경우: SESSION_MEMORY_BACKEND=redis, REDIS_URL=redis://localhost:6379

services:
  nginx:
    image: nginx:1.28-alpine
    container_name: bizi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-logs:/var/log/nginx
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - frontend
      - backend

  ssh-tunnel:
    image: alpine:3.21
    container_name: bizi-ssh-tunnel
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./.ssh/bizi-key.pem:/tmp/bizi-key.pem:ro
      - ./.ssh/known_hosts:/tmp/known_hosts:ro
      - ssh-known-hosts:/root/.ssh
    entrypoint:
      - sh
      - -c
      - |
        apk add --no-cache openssh-client > /dev/null 2>&1
        mkdir -p /root/.ssh
        cp /tmp/bizi-key.pem /root/.ssh/bizi-key.pem
        chmod 600 /root/.ssh/bizi-key.pem
        if [ -f /tmp/known_hosts ] && [ -s /tmp/known_hosts ]; then
          cp /tmp/known_hosts /root/.ssh/known_hosts
          chmod 644 /root/.ssh/known_hosts
          STRICT_MODE="yes"
        else
          STRICT_MODE="accept-new"
        fi
        echo "Starting SSH tunnel to RDS..."
        ssh -N \
          -L 0.0.0.0:3306:${MYSQL_HOST}:${MYSQL_PORT:-3306} \
          -o StrictHostKeyChecking=$$STRICT_MODE \
          -o UserKnownHostsFile=/root/.ssh/known_hosts \
          -o ServerAliveInterval=30 \
          -o ServerAliveCountMax=3 \
          -o ExitOnForwardFailure=yes \
          -i /root/.ssh/bizi-key.pem \
          ec2-user@${BASTION_HOST}
    healthcheck:
      test: ["CMD-SHELL", "netstat -tln | grep -q ':3306 ' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    expose:
      - "3306"

  backend:
    build: ./backend
    container_name: bizi-backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - app-logs:/var/log/app
    expose:
      - "8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - TZ=Asia/Seoul
      - MYSQL_HOST=ssh-tunnel
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE:-bizi_db}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - ENABLE_TEST_LOGIN=${ENABLE_TEST_LOGIN:-false}
      - RAG_API_KEY=${RAG_API_KEY:-}
      # 로컬에서 실행 중인 RAG 서비스 연결
      - RAG_SERVICE_URL=http://host.docker.internal:8001
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      ssh-tunnel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    command: >
      sh -c "python -c 'import jwt' || pip install --no-cache-dir 'PyJWT[crypto]>=2.8.0';
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    container_name: bizi-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "5173"
    environment:
      - VITE_API_URL=/api
      - VITE_RAG_ENABLED=${RAG_ENABLED:-true}
      - VITE_RAG_STREAMING=${VITE_RAG_STREAMING:-true}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: npm run dev -- --host

  chromadb:
    image: chromadb/chroma:1.5.0
    container_name: bizi-chromadb
    restart: unless-stopped
    expose:
      - "8000"
    ports:
      - "8200:8000"
    volumes:
      - chromadb_data:/data
    environment:
      - ANONYMIZED_TELEMETRY=false
      - CHROMA_SERVER_AUTHN_PROVIDER=${CHROMA_AUTH_TOKEN:+chromadb.auth.token_authn.TokenAuthenticationServerProvider}
      - CHROMA_SERVER_AUTHN_CREDENTIALS=${CHROMA_AUTH_TOKEN:-}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  ssh-known-hosts:
  chromadb_data:
  app-logs:
  nginx-logs:
